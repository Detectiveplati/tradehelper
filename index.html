<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Condition Dashboard | Day Trading Decision Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .subtitle {
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        /* Loading & Error States */
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #475569;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-banner {
            background-color: #7f1d1d;
            border: 1px solid #dc2626;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            color: #fecaca;
        }

        .error-banner strong {
            display: block;
            margin-bottom: 8px;
        }

        .warning-banner {
            background-color: #78350f;
            border: 1px solid #d97706;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            color: #fde047;
        }

        /* Overall Bias Box */
        .bias-summary {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            text-align: center;
        }

        .bias-summary.bullish {
            border-color: #10b981;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
        }

        .bias-summary.bearish {
            border-color: #ef4444;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(239, 68, 68, 0.05) 100%);
        }

        .bias-summary.mixed {
            border-color: #f59e0b;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%);
        }

        .bias-summary.risk-off {
            border-color: #ef4444;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.08) 100%);
        }

        .bias-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .bias-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .bias-summary.bullish .bias-value {
            color: #10b981;
        }

        .bias-summary.bearish .bias-value {
            color: #ef4444;
        }

        .bias-summary.mixed .bias-value {
            color: #f59e0b;
        }

        .bias-summary.risk-off .bias-value {
            color: #ef4444;
        }

        .bias-explanation {
            font-size: 1rem;
            color: #e2e8f0;
            line-height: 1.5;
        }

        /* Market Indicators Grid */
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Indicator Card */
        .indicator-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .indicator-card:hover {
            border-color: #475569;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .indicator-card.bullish {
            border-left: 4px solid #10b981;
        }

        .indicator-card.bearish {
            border-left: 4px solid #ef4444;
        }

        .indicator-card.neutral {
            border-left: 4px solid #f59e0b;
        }

        .indicator-card.caution {
            border-left: 4px solid #f59e0b;
        }

        .indicator-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .indicator-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        .indicator-symbol {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge.bullish {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.bearish {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-badge.neutral {
            background-color: rgba(156, 163, 175, 0.2);
            color: #d1d5db;
        }

        .status-badge.caution {
            background-color: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .indicator-values {
            margin-bottom: 16px;
        }

        .value-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .value-row:last-child {
            border-bottom: none;
        }

        .value-label {
            font-size: 0.875rem;
            color: #cbd5e1;
        }

        .value-content {
            text-align: right;
        }

        .value-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .value-change {
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
            margin-left: 8px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .value-change.positive {
            color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
        }

        .value-change.negative {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
        }

        .value-change.flat {
            color: #94a3b8;
            background-color: rgba(148, 163, 184, 0.1);
        }

        .direction {
            font-size: 1rem;
            font-weight: 600;
        }

        .direction-up {
            color: #10b981;
        }

        .direction-down {
            color: #ef4444;
        }

        .direction-flat {
            color: #94a3b8;
        }

        .direction-high {
            color: #ef4444;
        }

        .direction-normal {
            color: #f59e0b;
        }

        .direction-rising {
            color: #ef4444;
        }

        .direction-falling {
            color: #10b981;
        }

        .indicator-explanation {
            background-color: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #60a5fa;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
            margin-top: 16px;
        }

        .indicator-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #334155;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .data-source {
            display: inline-block;
            padding: 4px 8px;
            background-color: rgba(100, 116, 139, 0.2);
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .data-unavailable {
            background-color: rgba(107, 114, 128, 0.1);
            border: 1px dashed #6b7280;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #9ca3af;
            font-style: italic;
        }

        /* Timestamp & Refresh */
        .footer {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .refresh-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: 600;
        }

        .refresh-btn:hover {
            background-color: #2563eb;
        }

        .refresh-btn:disabled {
            background-color: #6b7280;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.75rem;
            }

            .indicators-grid {
                grid-template-columns: 1fr;
            }

            .indicator-card {
                padding: 16px;
            }

            .value-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .value-content {
                text-align: left;
                margin-top: 4px;
            }

            .indicator-meta {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Market Condition Dashboard</h1>
            <p class="subtitle">Real-time market environment assessment for day trading decisions</p>
        </header>

        <!-- Error Banner -->
        <div id="errorBanner" class="error-banner" style="display: none;"></div>

        <!-- Cache Warning -->
        <div id="cacheWarning" class="warning-banner" style="display: none;"></div>

        <!-- Loading State -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p style="margin-top: 16px;">Fetching market data...</p>
        </div>

        <!-- Main Content -->
        <div id="content" style="display: none;">
            <!-- Overall Bias Summary -->
            <div id="biasSummary" class="bias-summary"></div>

            <!-- Market Indicators Grid -->
            <div class="indicators-grid" id="indicatorsGrid"></div>

            <!-- Footer -->
            <div class="footer">
                <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">🔄 Refresh Data</button>
                <p style="margin-top: 16px;">
                    Last updated: <span id="lastUpdated">—</span>
                </p>
                <p style="margin-top: 8px; font-size: 0.75rem; color: #64748b;">
                    ℹ️ This dashboard shows market conditions only. It does NOT provide buy/sell recommendations.
                </p>
            </div>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────────────────────────────────────
        // UI Helper Functions
        // ─────────────────────────────────────────────────────────────────────────────

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            document.getElementById('errorBanner').style.display = 'none';
        }

        function showContent() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const banner = document.getElementById('errorBanner');
            banner.innerHTML = `<strong>Error:</strong> ${message}`;
            banner.style.display = 'block';
        }

        function showWarning(message) {
            const banner = document.getElementById('cacheWarning');
            banner.innerHTML = `<strong>⚠️ Cached Data:</strong> ${message}`;
            banner.style.display = 'block';
        }

        function formatDatetime(date) {
            if (!date) return '—';
            const d = new Date(date);
            return d.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
            });
        }

        function getDirectionClass(direction, type = 'generic') {
            direction = (direction || '').toLowerCase();

            if (type === 'stock') {
                if (direction === 'up') return 'direction-up';
                if (direction === 'down') return 'direction-down';
                return 'direction-flat';
            } else if (type === 'vix') {
                if (direction === 'low') return 'direction-flat';
                if (direction === 'normal') return 'direction-normal';
                if (direction === 'high') return 'direction-high';
                if (direction === 'extreme') return 'direction-high';
            } else if (type === 'yield') {
                if (direction === 'rising') return 'direction-rising';
                if (direction === 'falling') return 'direction-falling';
                return 'direction-flat';
            } else if (type === 'dxy') {
                if (direction === 'rising') return 'direction-rising';
                if (direction === 'falling') return 'direction-falling';
                return 'direction-flat';
            }

            return 'direction-flat';
        }

        function getChangeClass(value) {
            if (value > 0) return 'positive';
            if (value < 0) return 'negative';
            return 'flat';
        }

        function formatValue(value, type = 'number') {
            if (value === null || value === undefined) return '—';
            if (type === 'percent') return `${value > 0 ? '+' : ''}${value.toFixed(2)}%`;
            if (type === 'price') return `$${value.toFixed(2)}`;
            return value.toFixed(2);
        }

        // ─────────────────────────────────────────────────────────────────────────────
        // Render Functions
        // ─────────────────────────────────────────────────────────────────────────────

        function renderBiasSummary(data) {
            const bias = data.overallMarketBias || 'Unknown';
            const summary = data.summary || 'Unable to determine market bias.';

            let biasClass = 'mixed';
            if (bias === 'Bullish') biasClass = 'bullish';
            if (bias === 'Bearish' || bias === 'Risk-Off') biasClass = 'bearish';
            if (bias === 'Risk-Off') biasClass = 'risk-off';

            const html = `
                <div class="bias-label">Today's Market Bias</div>
                <div class="bias-value">${bias}</div>
                <p class="bias-explanation">${summary}</p>
            `;

            const element = document.getElementById('biasSummary');
            element.className = `bias-summary ${biasClass}`;
            element.innerHTML = html;
        }

        function renderIndicatorCard(key, data) {
            if (!data) {
                return `
                    <div class="indicator-card">
                        <div class="indicator-header">
                            <div>
                                <div class="indicator-name">Unable to Load</div>
                                <div class="indicator-symbol">${key.toUpperCase()}</div>
                            </div>
                        </div>
                        <div class="data-unavailable">Data unavailable</div>
                    </div>
                `;
            }

            const label = data.label || data.symbol;
            const status = data.status || 'Neutral';
            const statusClass = status.toLowerCase().includes('bullish') ? 'bullish' : status.toLowerCase().includes('bearish') ? 'bearish' : status.toLowerCase().includes('caution') ? 'caution' : 'neutral';

            let valueHtml = '';

            if (key === 'vix') {
                valueHtml = `
                    <div class="value-row">
                        <span class="value-label">Current Level</span>
                        <span class="value-content">
                            <span class="value-number">${formatValue(data.value)}</span>
                            <span class="value-change ${getChangeClass(data.changePercent)}">
                                ${data.changePercent > 0 ? '+' : ''}${data.changePercent.toFixed(2)}%
                            </span>
                        </span>
                    </div>
                    <div class="value-row">
                        <span class="value-label">Direction</span>
                        <span class="value-content">
                            <span class="direction ${getDirectionClass(data.direction, 'vix')}">${data.direction}</span>
                        </span>
                    </div>
                `;
            } else if (key === 'tenYearYield') {
                valueHtml = `
                    <div class="value-row">
                        <span class="value-label">Current Yield</span>
                        <span class="value-content">
                            <span class="value-number">${formatValue(data.value, 'percent')}</span>
                            <span class="value-change ${getChangeClass(data.change)}">
                                ${data.change > 0 ? '+' : ''}${data.change.toFixed(2)}%
                            </span>
                        </span>
                    </div>
                    <div class="value-row">
                        <span class="value-label">Direction</span>
                        <span class="value-content">
                            <span class="direction ${getDirectionClass(data.direction, 'yield')}">${data.direction}</span>
                        </span>
                    </div>
                `;
            } else {
                // SPY, QQQ, DXY
                valueHtml = `
                    <div class="value-row">
                        <span class="value-label">Current Price</span>
                        <span class="value-content">
                            <span class="value-number">${formatValue(data.value, 'price')}</span>
                            <span class="value-change ${getChangeClass(data.changePercent)}">
                                ${data.changePercent > 0 ? '+' : ''}${data.changePercent.toFixed(2)}%
                            </span>
                        </span>
                    </div>
                    <div class="value-row">
                        <span class="value-label">Direction</span>
                        <span class="value-content">
                            <span class="direction ${getDirectionClass(data.direction, 'stock')}">${data.direction}</span>
                        </span>
                    </div>
                `;
            }

            const proxyLabel = data.isProxy ? ' <em>(Proxy)</em>' : '';
            const sourceText = data.isProxy ? `${data.symbol} (proxy)` : data.symbol;

            return `
                <div class="indicator-card ${statusClass}">
                    <div class="indicator-header">
                        <div>
                            <div class="indicator-name">${label}${proxyLabel}</div>
                            <div class="indicator-symbol">${data.symbol}</div>
                        </div>
                        <div class="status-badge ${statusClass}">${status}</div>
                    </div>
                    <div class="indicator-values">
                        ${valueHtml}
                    </div>
                    <div class="indicator-explanation">
                        💡 ${data.explanation || 'No explanation available.'}
                    </div>
                    <div class="indicator-meta">
                        <span class="data-source">${sourceText}</span>
                        <span>${formatDatetime(data.timestamp)}</span>
                    </div>
                </div>
            `;
        }

        function renderDashboard(data) {
            renderBiasSummary(data);

            const order = ['spy', 'qqq', 'vix', 'tenYearYield', 'dxy'];
            const html = order.map(key => renderIndicatorCard(key, data[key])).join('');

            document.getElementById('indicatorsGrid').innerHTML = html;

            // Update last updated time
            document.getElementById('lastUpdated').textContent = formatDatetime(data.timestamp);

            showContent();
        }

        // ─────────────────────────────────────────────────────────────────────────────
        // API Fetch
        // ─────────────────────────────────────────────────────────────────────────────

        async function fetchMarketCondition() {
            try {
                showLoading();
                const response = await fetch('/api/market-condition');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.isCached) {
                    showWarning(data.cacheWarning || 'Showing cached data.');
                }

                renderDashboard(data);

                // Log errors if any
                if (data.errors && data.errors.length > 0) {
                    console.warn('API errors:', data.errors);
                }
            } catch (err) {
                console.error('Fetch error:', err);
                showError(`Failed to fetch market data: ${err.message}. Please check your API configuration.`);
            }
        }

        function refreshData() {
            document.getElementById('refreshBtn').disabled = true;
            document.getElementById('cacheWarning').style.display = 'none';
            fetchMarketCondition().finally(() => {
                document.getElementById('refreshBtn').disabled = false;
            });
        }

        // ─────────────────────────────────────────────────────────────────────────────
        // Initialization
        // ─────────────────────────────────────────────────────────────────────────────

        document.addEventListener('DOMContentLoaded', () => {
            fetchMarketCondition();

            // Auto-refresh every 5 minutes
            setInterval(fetchMarketCondition, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
